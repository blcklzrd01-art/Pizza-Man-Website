<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge Index</title>
  <style>
    :root {
      --bg: #0f0b0c;
      --bg-2: #171112;
      --panel: #b3aeb0;
      --panel-2: #9a9497;
      --dark: #4d4749;
      --dark-2: #5a5356;
      --accent: #6f2b33;
      --accent-2: #8c3943;
      --line: #20191b;
      --text: #0b0909;
      --shadow: 0 12px 30px rgba(0,0,0,.28);
      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #080606 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      min-height: 100vh;
      background: linear-gradient(180deg, #dbd7d9 0%, #d0cbcd 100%);
      max-width: 1350px;
      margin: 0 auto;
      border-left: 2px solid #4d2730;
      border-right: 2px solid #4d2730;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 54px;
      background: #b7b1b3;
      border-bottom: 5px solid #110d0e;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo {
      width: 94px;
      height: 94px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #a54a58;
      color: #f6ecef;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: .04em;
      border: 3px solid #31181d;
      box-shadow: var(--shadow);
      user-select: none;
    }

    .nav {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .pill-button {
      border: 0;
      background: var(--dark);
      color: #120f10;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 18px 35px;
      min-width: 176px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
      box-shadow: var(--shadow);
    }

    .pill-button:hover,
    .pill-button:focus-visible,
    .search-input:focus,
    .drop-toggle:hover,
    .drop-toggle:focus-visible,
    .victors-link:hover,
    .victors-link:focus-visible {
      transform: translateY(-1px);
      background: var(--dark-2);
      outline: none;
    }

    .content {
      padding: 42px 0 70px;
    }

    .container {
      width: min(1030px, calc(100% - 34px));
      margin: 0 auto;
    }

    .search-bar {
      background: var(--dark);
      border-radius: 999px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      box-shadow: var(--shadow);
      margin-bottom: 48px;
    }

    .search-input {
      width: 100%;
      border: none;
      background: transparent;
      color: #0d0a0a;
      font-size: 1.05rem;
      font-weight: 800;
      padding: 10px 4px;
    }

    .search-input::placeholder {
      color: #120f10;
      opacity: 1;
    }

    .card-stack {
      display: grid;
      gap: 28px;
    }

    .mode-card {
      background: var(--panel);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mode-header {
      background: var(--dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-radius: var(--radius-xl);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .mode-body {
      padding: 30px 44px 34px;
      display: grid;
      grid-template-columns: 1.15fr .95fr;
      gap: 36px;
      align-items: start;
    }

    .video-block {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      align-items: start;
    }

    .label,
    .meta-label {
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .video-embed {
      width: 400%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(180deg, #8d404c 0%, #77313b 100%);
      border-radius: 32px;
      border: 3px solid #422126;
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.04);
    }

    .video-embed iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-placeholder {
      font-weight: 900;
      text-align: center;
      padding: 18px;
      color: #f5ebed;
    }

    .info-col {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .info-line {
      font-size: 2rem;
      font-weight: 900;
    }

    .dropdown-group {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      justify-items: start;
    }

    .drop-toggle,
    .victors-link {
      border: none;
      border-radius: 999px;
      background: var(--dark);
      color: #120f10;
      font-weight: 900;
      font-size: 1rem;
      min-width: 275px;
      padding: 14px 28px;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .dropdown-panel {
      display: none;
      width: min(360px, 100%);
      background: var(--panel-2);
      border-radius: 24px;
      padding: 12px;
      box-shadow: var(--shadow);
      border: 2px solid #766f72;
    }

    .dropdown-panel.open {
      display: grid;
      gap: 8px;
    }

    .dropdown-item {
      display: block;
      width: 100%;
      border: none;
      border-radius: 16px;
      background: #d0cbcd;
      color: #120f10;
      font-weight: 800;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }

    .dropdown-item:hover,
    .dropdown-item:focus-visible {
      background: #dfdadd;
      transform: translateX(2px);
      outline: none;
    }

    .helper-note {
      margin-top: 30px;
      color: #342d2f;
      font-weight: 700;
      font-size: .95rem;
    }

    @media (max-width: 860px) {
      .topbar {
        padding: 14px 20px;
        flex-direction: column;
      }

      .nav {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
      }

      .mode-body {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .video-block {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .pill-button {
  min-width: 130px;
  width: 100%;
  text-align: center;
}
      .nav {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .mode-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .drop-toggle,
      .victors-link,
      .dropdown-panel {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="logo">LOGO</div>

      <nav class="nav" aria-label="Main navigation">
        <a class="pill-button" href="index.html">Home</a>
        <a class="pill-button" href="leaderboard.html">Leaderboard</a>
      </nav>
    </header>

    <main class="content">
      <div class="container">
        <section class="search-bar" aria-label="Search modes">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Search For A Mode by Title:"
            autocomplete="off"
          />
        </section>

        <section id="modeList" class="card-stack">
          <!-- DUPLICATE ONE .mode-card BLOCK TO ADD MORE ENTRIES -->
          <article class="mode-card" data-title="My Challenge For You">
            <div class="mode-header">
              <div>#1. My Challenge For You</div>
              <div>300 points</div>
            </div>

            <div class="mode-body">
              <div class="video-block">
                <div class="video-embed">
                  <!-- Replace the placeholder with a real embed if you want -->
                  <!-- Example:
                  <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="Mode video" allowfullscreen></iframe>
                  -->
                  <div class="video-placeholder">(YOUTUBE VIDEO LINK EMBED)</div>
                </div>
              </div>

              <div class="info-col">
                <div class="info-line">Verifier:</div>
                <div class="info-line">Creator:</div>

                <div class="dropdown-group">
                  <button class="drop-toggle" type="button" aria-expanded="false">Victors:</button>
                  <div class="dropdown-panel" aria-hidden="true">
                    <button class="dropdown-item" type="button">Victor Name 1</button>
                    <button class="dropdown-item" type="button">Victor Name 2</button>
                    <button class="dropdown-item" type="button">Victor Name 3</button>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <article class="mode-card" data-title="The Red Hall">
            <div class="mode-header">
              <div>#2. The Red Hall</div>
              <div>245 points</div>
            </div>

            <div class="mode-body">
              <div class="video-block">
                <div class="video-embed">
                  <div class="video-placeholder">(YOUTUBE VIDEO LINK EMBED)</div>
                </div>
              </div>

              <div class="info-col">
                <div class="info-line">Verifier:</div>
                <div class="info-line">Creator:</div>

                <div class="dropdown-group">
                  <button class="drop-toggle" type="button" aria-expanded="false">Victors:</button>
                  <div class="dropdown-panel" aria-hidden="true">
                    <button class="dropdown-item" type="button">Victor Name 1</button>
                    <button class="dropdown-item" type="button">Victor Name 2</button>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </section>

        <p class="helper-note">
          The
        </p>
      </div>
    </main>
  </div>

  <script>
    const toggles = document.querySelectorAll('.drop-toggle');

    toggles.forEach((toggle) => {
      toggle.addEventListener('click', () => {
        const panel = toggle.nextElementSibling;
        const isOpen = panel.classList.contains('open');

        panel.classList.toggle('open', !isOpen);
        panel.setAttribute('aria-hidden', String(isOpen));
        toggle.setAttribute('aria-expanded', String(!isOpen));
      });
    });

    const searchInput = document.getElementById('searchInput');
    const cards = document.querySelectorAll('.mode-card');

    searchInput.addEventListener('input', () => {
      const value = searchInput.value.trim().toLowerCase();

      cards.forEach((card) => {
        const title = card.dataset.title.toLowerCase();
        card.style.display = title.includes(value) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
