<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Site</title>
    <style>
        /* General styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* Top menu bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 10px 20px;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo-container {
            display: flex;
            align-items: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .navbar .logo {
            height: 40px;
            margin-right: 10px;
        }

        .navbar .site-name {
            font-weight: bold;
            font-size: 20px;
        }

        .navbar .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .navbar .nav-buttons button {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        .navbar .nav-buttons button:hover {
            background-color: #555;
        }

        /* Main content */
        .main {
            margin-top: 80px; /* to avoid navbar overlap */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        /* Hamburger drop-down buttons */
        .card-button {
            width: 300px;
            background-color: #ccc;
            border: 1px solid #999;
            border-radius: 4px;
            cursor: pointer;
            padding: 10px;
            text-align: left;
            font-weight: bold;
            position: relative;
        }

        .card-button:hover {
            background-color: #bbb;
        }

        .dropdown-content {
            display: none;
            flex-direction: column;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #999;
            border-radius: 4px;
            position: relative;
        }

        .dropdown-content iframe {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
        }

        .dropdown-content button {
            background-color: #888;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .dropdown-content button:hover {
            background-color: #777;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="nav-buttons">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='leaderboard.html'">Leaderboard</button>
        </div>
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo">
            <div class="site-name">My Site</div>
        </div>
    </div>

    <!-- Main content -->
    <div class="main">

        <!-- Card buttons -->
        <div class="card">
            <div class="card-button" onclick="toggleDropdown(1)">1. Example Title</div>
            <div class="dropdown-content" id="dropdown-1">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                <p>Verifier: ExampleVerifier</p>
                <p>Creator: ExampleCreator</p>
                <button onclick="location.href='card1.html'">Go to card page</button>
            </div>
        </div>

        <div class="card">
            <div class="card-button" onclick="toggleDropdown(2)">2. Another Title</div>
            <div class="dropdown-content" id="dropdown-2">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                <p>Verifier: Verifier2</p>
                <p>Creator: Creator2</p>
                <button onclick="location.href='card2.html'">Go to card page</button>
            </div>
        </div>

        <!-- Repeat similar blocks for buttons 3-10 -->
        <!-- For simplicity, you can copy-paste and change IDs and titles -->

    </div>

    <script>
        function toggleDropdown(id) {
            const dropdown = document.getElementById(`dropdown-${id}`);
            if (dropdown.style.display === 'flex') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'flex';
            }
        }
    </script>

</body>
</html>
